# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  # pull_request:
    # branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Setup Go environment
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      # Build Linux binary
      - name: Build function binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dnd-function
          echo "Binary size: $(du -h dnd-function | cut -f1)"

      # Deploy function using YC action
      - name: Deploy function to YC
        uses: okar1/yc-cli-install@v1.1
        with:
          sa_key: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          function_name: 'goha'
          runtime: 'golang123'
          entrypoint: 'index.Handler'
          memory: '256Mb'
          execution_timeout: '5s'
          source_path: 'dnd-function'
          environment: |
            DEBUG=True
            COUNT=1
