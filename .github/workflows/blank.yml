# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  # pull_request:
    # branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Setup Go environment
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      # Build Linux binary
      - name: Build function binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dnd-function
          echo "Binary size: $(du -h dnd-function | cut -f1)"

      # Install YC CLI via direct download
      - name: Install YC CLI
        run: |
          # Download YC CLI from GitHub releases mirror
          wget -q https://github.com/ydb-platform/yc/releases/download/v0.132.0/yc-linux-amd64 -O yc
          chmod +x yc
          sudo mv yc /usr/local/bin/
          yc --version

      # Deploy function with binary
      - name: Deploy function to YC
        run: |
          # Authenticate with YC
          echo '${{ secrets.YC_SA_JSON_CREDENTIALS }}' > sa-key.json
          yc config profile create github-actions
          yc config set service-account-key sa-key.json
          yc config set folder-id ${{ secrets.FOLDER_ID }}

          # Create command parts
          TAGS="--tag ${GITHUB_SHA::7}"
          if [ -n "${{ vars.ADDITIONAL_TAG }}" ]; then
            TAGS="$TAGS --tag ${{ vars.ADDITIONAL_TAG }}"
          fi

          # Add secrets if configured
          SECRETS=""
          if [ -n "${{ vars.DB_SECRET_ID }}" ]; then
            SECRETS="$SECRETS --environment='DB_PASSWORD=lockbox-secret://${{ vars.DB_SECRET_ID }}/latest/password'"
          fi
          if [ -n "${{ vars.API_SECRET_ID }}" ]; then
            SECRETS="$SECRETS --environment='API_KEY=lockbox-secret://${{ vars.API_SECRET_ID }}/latest/api_key'"
          fi

          yc serverless function version create \
            --function-name='goha' \
            --runtime='golang123' \
            --entrypoint='index.Handler' \
            --memory='256Mb' \
            --execution-timeout='5s' \
            --source-path='dnd-function' \
            --environment='DEBUG=True' \
            --environment='COUNT=1' \
            $SECRETS \
            $TAGS

      # Cleanup credentials
      - name: Cleanup credentials
        if: always()
        run: rm -f sa-key.json
